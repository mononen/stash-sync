name: Stash Scrape
description: Scrape scene metadata in the background as a task
version: 0.2.3

ui:
  javascript:
    - stash_scrape_ui.js

settings:
  stashbox_endpoint:
    displayName: Stash-Box Endpoint
    description: Stash-Box endpoint URL to use (leave empty to auto-use the first one configured in Stash settings)
    type: STRING
  overwrite_data:
    displayName: Overwrite Existing Data
    description: Overwrite scene fields (title, date, details, etc.) that already have values when saving
    type: BOOLEAN

exec:
  - python
  - "{pluginDir}/stash-scrape.py"

interface: raw
errLog: warning

tasks:
  - name: Match Scenes
    description: Scrape every scene and save only the Stash-Box ID — no metadata changes
    defaultArgs:
      mode: match_all
  - name: Scrape & Save All
    description: Scrape every scene and save all metadata, creating any missing studios, performers, and tags
    defaultArgs:
      mode: scrape_all
  - name: Match Single Scene
    description: Match a single scene to Stash-Box and save its ID (used by the UI)
    defaultArgs:
      mode: match_scene
  - name: Scrape & Save Single Scene
    description: Scrape a single scene and save all metadata (used by the UI)
    defaultArgs:
      mode: scrape_scene
  - name: Match Selected
    description: Match a selection of scenes to Stash-Box and save their IDs (used by the UI)
    defaultArgs:
      mode: match_selected
  - name: Scrape & Save Selected
    description: Scrape a selection of scenes and save all metadata (used by the UI)
    defaultArgs:
      mode: scrape_selected
